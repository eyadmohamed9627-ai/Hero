<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HERO STORE ⚡</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --electric-blue: #00f5ff;
            --dark-bg: #000000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--dark-bg); color: #fff; overflow-x: hidden; }

        /* 1. تأثير الرعد المطور على الصورة اللي بعتها */
        .thunder-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; background: url('https://i.ibb.co/cX8hJNDx/IMG-1910.jpg') center/cover no-repeat fixed;
            filter: brightness(0.4) saturate(1.2);
            animation: thunderStrike 8s infinite;
        }

        @keyframes thunderStrike {
            0%, 90%, 94%, 98%, 100% { filter: brightness(0.4) saturate(1.2); }
            92%, 96% { filter: brightness(1.8) contrast(1.5) hue-rotate(10deg); } /* لحظة البرق */
        }

        /* 2. الهيدر */
        .navbar { 
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; 
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); position: sticky; top: 0; 
            z-index: 1000; border-bottom: 2px solid var(--electric-blue);
        }
        .logo { font-family: 'Oswald', sans-serif; font-size: 1.8rem; font-weight: 900; color: #fff; text-shadow: 0 0 10px var(--electric-blue); }
        .cart-btn { position: relative; cursor: pointer; color: var(--electric-blue); font-size: 1.5rem; }

        /* 3. المنتجات - نظام الصفين */
        .container { 
            padding: 20px 4%; 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); /* صفين ثابتين */
            gap: 15px; 
        }

        .product-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(0, 245, 255, 0.1);
            transition: 0.3s;
            cursor: pointer;
        }
        .product-card:hover { border-color: var(--electric-blue); transform: translateY(-5px); }

        .img-box { height: 200px; overflow: hidden; position: relative; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }

        .info-box { padding: 12px; text-align: right; }
        .info-box h3 { font-size: 0.85rem; margin-bottom: 5px; color: #eee; }
        .price { color: var(--electric-blue); font-weight: 900; font-size: 1.1rem; font-family: 'Oswald'; }

        /* 4. صفحة التفاصيل (تفتح عند الضغط) */
        .detail-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 2000; display: none;
            overflow-y: auto; padding: 0 0 40px 0;
        }
        .close-detail { position: absolute; top: 20px; left: 20px; font-size: 2rem; color: var(--electric-blue); z-index: 2001; cursor: pointer; }
        .detail-img { width: 100%; max-height: 450px; object-fit: cover; border-bottom: 3px solid var(--electric-blue); }
        .detail-content { padding: 25px; text-align: right; }
        .detail-title { font-size: 2.2rem; font-family: 'Oswald'; margin-bottom: 10px; color: #fff; }
        .detail-desc { color: #bbb; margin-bottom: 25px; line-height: 1.8; font-size: 1rem; }
        
        .action-btn {
            width: 100%; padding: 18px; background: var(--electric-blue); color: #000;
            border: none; border-radius: 12px; font-weight: 900; font-size: 1.2rem; cursor: pointer;
            text-transform: uppercase; transition: 0.3s;
        }
        .action-btn:hover { box-shadow: 0 0 20px var(--electric-blue); }

        /* 5. السلة */
        .cart-modal { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:3000; display:none; flex-direction:column; padding:25px; }
        .cart-item { display:flex; justify-content:space-between; padding:15px; background:#111; margin-bottom:10px; border-radius:10px; border:1px solid #222; }
    </style>
</head>
<body>

    <div class="thunder-container"></div>

    <nav class="navbar">
        <div class="logo">HERO STORE</div>
        <div class="cart-btn" onclick="openCart()">
            <i class="fas fa-shopping-basket"></i>
            <span id="cartCount" style="position:absolute; top:-10px; right:-15px; background:var(--electric-blue); color:#000; font-size:0.75rem; font-weight:bold; padding:2px 7px; border-radius:50%">0</span>
        </div>
    </nav>

    <div class="container" id="mainGrid"></div>

    <div class="detail-overlay" id="detailOverlay">
        <i class="fas fa-times close-detail" onclick="closeDetail()"></i>
        <div id="detailView"></div>
    </div>

    <div class="cart-modal" id="cartModal">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h2 style="color:var(--electric-blue)">طلباتك يا وحش ⚡</h2>
            <i class="fas fa-arrow-left" onclick="closeCart()" style="font-size:1.8rem; cursor:pointer"></i>
        </div>
        <div id="cartList" style="flex:1; overflow-y:auto;"></div>
        <div id="totalDisplay" style="padding:20px; font-size:1.8rem; text-align:center; color:var(--electric-blue); font-family:'Oswald'"></div>
        
        <form action="https://formspree.io/f/xjgjkvqv" method="POST" style="background:#080808; padding:20px; border-radius:15px; border:1px solid #222;">
            <input type="hidden" name="Order_Items" id="orderData">
            <input type="text" name="Name" placeholder="الاسم بالكامل" required style="width:100%; padding:15px; margin-bottom:12px; background:#000; border:1px solid #333; color:#fff; border-radius:8px; outline:none;">
            <input type="tel" name="Phone" placeholder="رقم الموبايل للواتساب" required style="width:100%; padding:15px; margin-bottom:15px; background:#000; border:1px solid #333; color:#fff; border-radius:8px; outline:none;">
            <button type="submit" class="action-btn">إرسال الطلب (Gmail) 🚀</button>
        </form>
    </div>

    <script>
        const products = [
            { id: 1, name: "سترينجر هيرو - أسود نيون", price: 350, img: "https://images.unsplash.com/photo-1583454110551-21f2fa20019b?w=700", desc: "خامة قطنية 100% ليكرا، قصة ضيقة تبرز تفاصيل العضلات، مثالي للتمارين الشاقة." },
            { id: 2, name: "تيشيرت بروفورمانس", price: 450, img: "https://images.unsplash.com/photo-1521572267360-ee0c2909d518?w=700", desc: "مزود بتقنية طرد العرق وسريع الجفاف، خفيف جداً على الجسم أثناء التمرين." },
            { id: 3, name: "بنطلون جوجر برو", price: 600, img: "https://images.unsplash.com/photo-1506629082955-511b1aa562c8?w=700", desc: "جيوب جانبية بسوستة مخفية، نسيج مرن يسمح لك بالسكوات والجري بحرية كاملة." },
            { id: 4, name: "هودى الشتاء هيرو", price: 850, img: "https://images.unsplash.com/photo-1556813820-673c2f92d46a?w=700", desc: "بطانة داخلية ناعمة للتدفئة، تصميم عصري لوجو هيرو العاكس في الظلام." }
        ];

        let myCart = [];

        // عرض المنتجات صفين
        function loadGrid() {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = products.map(p => `
                <div class="product-card" onclick="openDetail(${p.id})">
                    <div class="img-box"><img src="${p.img}"></div>
                    <div class="info-box">
                        <h3>${p.name}</h3>
                        <div class="price">${p.price} EGP</div>
                        <p style="font-size:0.65rem; color:var(--electric-blue); margin-top:4px;">تفاصيل القطعة ⚡</p>
                    </div>
                </div>
            `).join('');
        }

        // فتح صفحة التفاصيل
        function openDetail(id) {
            const p = products.find(i => i.id === id);
            const view = document.getElementById('detailView');
            view.innerHTML = `
                <img src="${p.img}" class="detail-img">
                <div class="detail-content">
                    <h1 class="detail-title">${p.name}</h1>
                    <div class="price" style="font-size:2rem; margin-bottom:20px;">${p.price} EGP</div>
                    <p class="detail-desc">${p.desc}</p>
                    <button class="action-btn" onclick="addToCart(${p.id}); closeDetail();">أضف إلى معداتك 🔥</button>
                </div>
            `;
            document.getElementById('detailOverlay').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeDetail() { 
            document.getElementById('detailOverlay').style.display = 'none'; 
            document.body.style.overflow = 'auto';
        }

        function addToCart(id) {
            const p = products.find(i => i.id === id);
            myCart.push(p);
            updateCart();
        }

        function updateCart() {
            document.getElementById('cartCount').innerText = myCart.length;
            let total = 0;
            let summary = "";
            const list = document.getElementById('cartList');
            
            list.innerHTML = myCart.map(item => {
                total += item.price;
                summary += `- ${item.name} (${item.price} EGP)\n`;
                return `<div class="cart-item"><span>${item.name}</span><span style="color:var(--electric-blue)">${item.price} EGP</span></div>`;
            }).join('');
            
            document.getElementById('totalDisplay').innerText = `TOTAL: ${total} EGP`;
            document.getElementById('orderData').value = `تفاصيل الطلب:\n${summary}\nالإجمالي: ${total} EGP`;
        }

        function openCart() { 
            if(myCart.length === 0) return alert("السلة فاضية يا وحش!");
            document.getElementById('cartModal').style.display = 'flex'; 
        }
        function closeCart() { document.getElementById('cartModal').style.display = 'none'; }

        loadGrid();
    </script>
</body>
</html>
