<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HERO STORE ⚡ | معدات الوحوش</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --electric-blue: #00f5ff;
            --thunder-purple: #9d00ff;
            --dark-void: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        
        body { 
            background-color: #000; 
            color: #fff; 
            overflow-x: hidden; 
            line-height: 1.6;
        }

        /* حاوية الخلفية التفاعلية - معدلة لتظهر الصورة بوضوح */
        .live-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            background: #000;
        }

        /* الصورة الحقيقية - مرجعة للونها الطبيعي مع توهج أزرق نيون */
        .live-bg-img {
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.15; /* غمقناها جداً لتظهر بوضوح كخلفية */
            /* شلت فلاتر اللون، وضفت فلاتر للنيون */
            filter: saturate(1.8) contrast(1.3) hue-rotate(200deg); /* فلتر كهربائي أزرق */
            animation: thunderFlicker 5s infinite; /* تأثير البرق المتكرر */
            box-shadow: inset 0 0 100px #000; /* ظل أسود ناعم من الحواف */
        }

        /* طبقة نيون إضافية */
        .neon-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(rgba(0,0,0,0.8), transparent 30%, transparent 70%, rgba(0,0,0,0.8));
            pointer-events: none;
        }

        /* Navbar */
        .navbar { 
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; 
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); position: sticky; top: 0; 
            z-index: 1000; border-bottom: 2px solid var(--electric-blue);
            box-shadow: 0 5px 20px rgba(0, 245, 255, 0.2);
        }
        .logo { font-family: 'Oswald', sans-serif; font-size: 2.2rem; font-weight: 900; letter-spacing: 3px; color: #fff; text-shadow: 0 0 15px var(--electric-blue); }
        .cart-icon { position: relative; cursor: pointer; font-size: 1.6rem; color: var(--electric-blue); transition: 0.3s; }
        .cart-icon:hover { transform: scale(1.1); color: #fff; text-shadow: 0 0 10px #fff; }
        .badge { position: absolute; top: -10px; right: -15px; background: var(--thunder-purple); color: white; font-size: 0.7rem; padding: 4px 8px; border-radius: 50%; box-shadow: 0 0 15px var(--thunder-purple); }

        /* Hero Section */
        .hero {
            height: 60vh; display: flex; flex-direction: column; justify-content: center; 
            align-items: center; text-align: center; background: radial-gradient(circle, rgba(0,245,255,0.08) 0%, transparent 75%);
        }
        .hero h1 { font-family: 'Oswald', sans-serif; font-size: 5.5rem; font-weight: 900; text-transform: uppercase; filter: drop-shadow(0 0 30px var(--electric-blue)); margin-bottom: 10px; }
        .hero p { font-size: 1.3rem; color: var(--electric-blue); font-weight: bold; letter-spacing: 2px; }

        /* Product Grid */
        .container { padding: 30px 5% 80px; display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px; }
        
        /* تطوير شكل الكارت - جعل الخلفية شفافة (Glassmorphism) */
        .card {
            background: transparent; /* خلفية شفافة */
            backdrop-filter: blur(10px); /* تأثير ضبابي شفاف */
            border-radius: 25px; 
            overflow: hidden; 
            border: 1px solid rgba(0, 245, 255, 0.15); transition: all 0.5s ease; position: relative;
        }
        .card:hover { transform: translateY(-15px) scale(1.02); border-color: var(--electric-blue); box-shadow: 0 15px 40px rgba(0, 245, 255, 0.25); }
        
        .img-container { position: relative; height: 420px; overflow: hidden; }
        .card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.8s ease; }
        .card:hover img { transform: scale(1.15); }
        
        .badge-new { position: absolute; top: 18px; right: 18px; background: var(--electric-blue); color: #000; padding: 6px 18px; font-weight: 900; border-radius: 50px; z-index: 2; font-size: 0.85rem; box-shadow: 0 0 15px var(--electric-blue); }

        .card-info { padding: 25px; background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.95)); }
        .card-info h3 { font-size: 1.4rem; margin-bottom: 12px; color: #fff; font-weight: 700; }
        .price { font-size: 1.7rem; color: var(--electric-blue); font-family: 'Oswald', sans-serif; font-weight: 700; }

        .add-btn { 
            width: 100%; background: transparent; color: var(--electric-blue); border: 2px solid var(--electric-blue); 
            padding: 14px; border-radius: 15px; font-weight: 900; cursor: pointer; transition: all 0.3s; margin-top: 20px;
            display: flex; justify-content: center; align-items: center; gap: 10px; font-size: 1.05rem;
        }
        .add-btn:hover { background: var(--electric-blue); color: #000; box-shadow: 0 0 25px var(--electric-blue); }

        /* Cart Page */
        .cart-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: none; flex-direction: column; padding: 25px; }
        .cart-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 20px; }
        .cart-items-container { flex: 1; overflow-y: auto; margin: 25px 0; }
        .cart-item { display: flex; gap: 18px; background: #080808; padding: 18px; border-radius: 15px; margin-bottom: 12px; align-items: center; border: 1px solid #1a1a1a; }
        .cart-item img { width: 65px; height: 65px; border-radius: 10px; object-fit: cover; }
        
        .total-box { font-size: 1.6rem; font-weight: 900; color: var(--electric-blue); text-align: center; padding: 18px; border-top: 1px dashed #333; margin-top: auto; }
        .form-box { background: #080808; padding: 25px; border-radius: 18px; border: 1px solid #1a1a1a; }
        .input-lx { width: 100%; padding: 14px; background: #000; border: 1px solid #222; color: #fff; border-radius: 10px; margin-bottom: 12px; outline: none; font-size: 0.95rem; }
        .input-lx:focus { border-color: var(--electric-blue); box-shadow: 0 0 10px rgba(0, 245, 255, 0.1); }

        /* الأنميشين */
        @keyframes thunderFlicker {
            0%, 93%, 100% { opacity: 0.15; filter: saturate(1.8) contrast(1.3) hue-rotate(200deg); }
            95% { opacity: 0.4; filter: saturate(2.5) contrast(2) hue-rotate(200deg); } /* لحظة الرعد */
            97% { opacity: 0.2; filter: saturate(1.8) contrast(1.3) hue-rotate(200deg); }
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1.5px, 0, 0); }
            20%, 80% { transform: translate3d(3px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
        }
    </style>
</head>
<body>

    <div class="live-bg">
        <img src="https://i.ibb.co/cX8hJNDx/IMG-1910.jpg" alt="Background" class="live-bg-img fixed">
    </div>
    <div class="neon-overlay"></div>

    <nav class="navbar">
        <div class="logo">HERO</div>
        <div class="cart-icon" onclick="openCart()">
            <i class="fas fa-bolt"></i>
            <span class="badge" id="cartBadge">0</span>
        </div>
    </nav>

    <div class="hero">
        <h1>HERO STORE</h1>
        <p>AWAKEN THE BEAST WITHIN ⚡</p>
    </div>

    <div class="container" id="productGrid">
        </div>

    <div class="cart-page" id="cartPage">
        <div class="cart-header">
            <h2 style="color: var(--electric-blue);">معداتك الجاهزة ⚡</h2>
            <i class="fas fa-times" onclick="closeCart()" style="cursor:pointer; font-size: 1.8rem; color: #fff;"></i>
        </div>
        
        <div class="cart-items-container" id="cartList"></div>
        
        <div class="total-box" id="totalPrice">الإجمالي: 0 EGP</div>

        <form action="https://formspree.io/f/xjgjkvqv" method="POST" class="form-box" onsubmit="return validateForm()">
            <input type="hidden" name="Order_Details" id="hiddenData">
            
            <input type="text" name="Name" class="input-lx" placeholder="الاسم بالكامل" required>
            <input type="tel" name="Phone" class="input-lx" placeholder="رقم الموبايل" required>
            <textarea name="Address" class="input-lx" placeholder="العنوان بالتفصيل" required></textarea>
            
            <button type="submit" class="add-btn" style="background: var(--electric-blue); color: #000;">
                تأكيد الطلب وشحن القوة 🚀
            </button>
        </form>
    </div>

    <script>
        // مصفوفة المنتجات (تقدر تعدلها براحتك)
        const products = [
            { id: 1, name: "سترينجر هيرو الأصلي", price: 350, img: "https://images.unsplash.com/photo-1583454110551-21f2fa20019b?w=600" },
            { id: 2, name: "تيشيرت الدرع الأسود", price: 450, img: "https://images.unsplash.com/photo-1521572267360-ee0c2909d518?w=600" },
            { id: 3, name: "بنطلون تايتان برو", price: 600, img: "https://images.unsplash.com/photo-1506629082955-511b1aa562c8?w=600" },
            { id: 4, name: "هودى الوحش", price: 850, img: "https://images.unsplash.com/photo-1556813820-673c2f92d46a?w=600" }
        ];

        let cart = [];

        function renderProducts() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = products.map(p => `
                <div class="card">
                    <div class="badge-new">NEW</div>
                    <div class="img-container">
                        <img src="${p.img}" alt="${p.name}">
                    </div>
                    <div class="card-info">
                        <h3>${p.name}</h3>
                        <div class="price">${p.price} EGP</div>
                        <button class="add-btn" onclick="addToCart(${p.id})">
                            أضف للقوة 🔥
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            cart.push(product);
            updateUI();
            
            // تأثير الهزة عند الإضافة
            document.body.style.animation = "shake 0.35s";
            setTimeout(() => document.body.style.animation = "", 350);
        }

        function updateUI() {
            const cartList = document.getElementById('cartList');
            const badge = document.getElementById('cartBadge');
            const totalBox = document.getElementById('totalPrice');
            const hiddenData = document.getElementById('hiddenData');

            badge.innerText = cart.length;
            
            let total = 0;
            let orderSummary = "";

            cartList.innerHTML = cart.map((item, index) => {
                total += item.price;
                orderSummary += `- ${item.name} (${item.price} EGP)\n`;
                return `
                    <div class="cart-item">
                        <img src="${item.img}">
                        <div style="flex:1">
                            <div style="font-weight:700">${item.name}</div>
                            <div style="color:var(--electric-blue)">${item.price} EGP</div>
                        </div>
                        <i class="fas fa-trash" style="color:#ff4d4d; cursor:pointer;" onclick="removeFromCart(${index})"></i>
                    </div>
                `;
            }).join('');

            totalBox.innerText = `الإجمالي: ${total} EGP`;
            hiddenData.value = `تفاصيل الأوردر:\n${orderSummary}\nإجمالي الحساب: ${total} EGP`;
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateUI();
        }

        function openCart() {
            if(cart.length === 0) return alert("السلة فاضية يا وحش! املاها الأول 💪");
            document.getElementById('cartPage').style.display = 'flex';
        }

        function closeCart() {
            document.getElementById('cartPage').style.display = 'none';
        }

        function validateForm() {
            if(cart.length === 0) return false;
            alert("جارى إرسال طلبك عبر البرق.. سيتم توجيهك الآن ✅");
            return true;
        }

        renderProducts();
    </script>
</body>
</html>
