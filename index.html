<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YAAYAA STORE | Luxury Collection</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        /* الأساسيات */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #fcfcfc;
            color: #333;
        }

        /* قسم الترحيب - Hero Section */
        .hero {
            height: 80vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1548036328-c9fa89d128fa?q=80&w=2069') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            letter-spacing: 10px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .hero p {
            font-size: 1.2rem;
            letter-spacing: 4px;
            margin-bottom: 30px;
            font-weight: 300;
        }

        .shop-now-btn {
            padding: 12px 35px;
            border: 1px solid white;
            color: white;
            text-decoration: none;
            letter-spacing: 2px;
            transition: 0.3s;
            font-size: 0.8rem;
        }

        .shop-now-btn:hover {
            background: white;
            color: black;
        }

        /* قسم المنتجات - Products Section */
        .container {
            max-width: 1200px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .section-title {
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin-bottom: 40px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .product-card {
            background: white;
            padding: 15px;
            text-align: center;
            transition: transform 0.3s ease;
            border: 1px solid #eee;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .product-image {
            width: 100%;
            height: 350px;
            background-color: #f4f4f4;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .product-card:hover img {
            transform: scale(1.05);
        }

        .product-info h3 {
            font-size: 1.1rem;
            margin-bottom: 8px;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .price {
            color: #888;
            font-weight: 400;
            margin-bottom: 15px;
            display: block;
        }

        .view-btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: #000;
            color: #fff;
            text-decoration: none;
            font-size: 0.75rem;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .view-btn:hover {
            background-color: #444;
        }

        /* تعديلات الموبايل */
        @media (max-width: 768px) {
            .hero h1 { font-size: 2.5rem; }
            .product-grid { grid-template-columns: 1fr 1fr; gap: 15px; }
            .product-image { height: 200px; }
        }
    </style>
</head>
<body>

    <section class="hero">
        <h1>YAAYAA STORE</h1>
        <p>ELEVATE YOUR STYLE</p>
        <a href="#collection" class="shop-now-btn">SHOP NOW</a>
    </section>

    <div class="container" id="collection">
        <h2 class="section-title">New Arrivals</h2>
        
        <div class="product-grid">
            <div class="product-card">
                <div class="product-image">
                    <img src="https://images.unsplash.com/photo-1590874103328-eac38a683ce7?q=80&w=1000" alt="Bag 1">
                </div>
                <div class="product-info">
                    <h3>Classic Leather Tote</h3>
                    <span class="price">EGP 2,400</span>
                    <a href="#" class="view-btn">VIEW PRODUCT</a>
                </div>
            </div>

            <div class="product-card">
                <div class="product-image">
                    <img src="https://images.unsplash.com/photo-1584917865442-de89df76afd3?q=80&w=1000" alt="Bag 2">
                </div>
                <div class="product-info">
                    <h3>Premium Crossbody</h3>
                    <span class="price">EGP 1,850</span>
                    <a href="#" class="view-btn">VIEW PRODUCT</a>
                </div>
            </div>

            <div class="product-card">
                <div class="product-image">
                    <img src="https://images.unsplash.com/photo-1591561954557-26941169b49e?q=80&w=1000" alt="Bag 3">
                </div>
                <div class="product-info">
                    <h3>Luxury Handbag</h3>
                    <span class="price">EGP 3,200</span>
                    <a href="#" class="view-btn">VIEW PRODUCT</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
