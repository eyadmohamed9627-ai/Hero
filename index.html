<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HERO STORE ⚡</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --electric-blue: #00f5ff; --dark-bg: #050505; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: var(--dark-bg); color: #fff; }
        
        /* Navbar */
        .navbar { padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; background: #000; border-bottom: 2px solid var(--electric-blue); position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Oswald'; font-size: 2rem; font-weight: 900; text-shadow: 0 0 10px var(--electric-blue); }
        .cart-btn { color: var(--electric-blue); font-size: 1.8rem; cursor: pointer; position: relative; }
        .badge { position: absolute; top: -5px; right: -10px; background: red; font-size: 0.7rem; padding: 2px 6px; border-radius: 50%; }

        /* Grid */
        .container { padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: #111; border-radius: 15px; overflow: hidden; border: 1px solid #222; text-align: center; }
        .card img { width: 100%; height: 220px; object-fit: cover; cursor: pointer; }
        .card-info { padding: 15px; }
        .price { color: var(--electric-blue); font-family: 'Oswald'; font-size: 1.4rem; }

        /* المودالات (السلة وعرض المنتج) */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: none; flex-direction: column; padding: 20px; overflow-y: auto; }
        .modal-content { background: #111; padding: 20px; border-radius: 20px; border: 1px solid var(--electric-blue); margin-top: 20px; }
        
        /* عرض المنتج */
        .view-img { width: 100%; border-radius: 15px; margin-bottom: 15px; border: 1px solid #333; }
        .view-title { font-size: 1.5rem; color: #fff; margin-bottom: 10px; }
        .view-desc { font-size: 0.9rem; color: #aaa; margin-bottom: 20px; line-height: 1.6; }

        /* الدفع */
        .payment-option { border: 1px solid #333; padding: 15px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; }
        .active { border-color: var(--electric-blue); background: rgba(0, 245, 255, 0.05); }
        #voda-box { background: #1a0000; padding: 15px; border-radius: 10px; border: 1px solid #e60000; display: none; margin-bottom: 15px; }
        
        input { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #333; background: #111; color: #fff; text-align: right; }
        .btn-main { background: var(--electric-blue); color: #000; border: none; padding: 15px; border-radius: 8px; font-weight: 900; width: 100%; cursor: pointer; margin-top: 10px; }
        .close-icon { float: left; font-size: 1.5rem; cursor: pointer; color: #fff; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">HERO</div>
        <div class="cart-btn" onclick="openModal('cartModal')">
            <i class="fas fa-bolt"></i>
            <span class="badge" id="count">0</span>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1521572267360-ee0c2909d518?w=600" onclick="viewProduct('تيشيرت الدرع الأسود', '450 EGP', this.src, 'تيشيرت قطن 100% عالي الجودة، تصميم مريح للتمارين الشاقة، مقاوم للعرق ويعطي مظهر الوحش.')">
            <div class="card-info">
                <p>تيشيرت الدرع الأسود</p>
                <div class="price">450 EGP</div>
            </div>
        </div>
    </div>

    <div id="productView" class="modal">
        <i class="fas fa-times close-icon" onclick="closeModal('productView')"></i>
        <div class="modal-content">
            <img id="v-img" src="" class="view-img">
            <h2 id="v-title" class="view-title"></h2>
            <p id="v-price" class="price" style="margin-bottom: 10px;"></p>
            <p id="v-desc" class="view-desc"></p>
            <button class="btn-main" onclick="add(); closeModal('productView')">أضف للقوة ⚡</button>
        </div>
    </div>

    <div id="cartModal" class="modal">
        <i class="fas fa-times close-icon" onclick="closeModal('cartModal')"></i>
        <h2 style="color:var(--electric-blue); margin-bottom:20px;">الدفع والشحن</h2>

        <div class="payment-option active" id="opt-cash" onclick="setPayment('cash')">كاش عند الاستلام</div>
        <div class="payment-option" id="opt-voda" onclick="setPayment('voda')">فودافون كاش</div>

        <div id="voda-box">
            <p style="text-align:center">حول لـ: <strong style="color:#e60000">010XXXXXXXX</strong></p>
            <input type="file" accept="image/*">
        </div>

        <form action="https://formspree.io/f/xjgjkvqv" method="POST">
            <input type="hidden" name="Method" id="method-val" value="Cash">
            <input type="text" name="Name" placeholder="الاسم" required>
            <input type="tel" name="Phone" placeholder="الموبايل" required>
            <input type="text" name="Address" placeholder="العنوان" required>
            <button type="submit" class="btn-main">تأكيد الأوردر 🚀</button>
        </form>
    </div>

    <script>
        let cart = 0;
        function add() { cart++; document.getElementById('count').innerText = cart; }
        
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // وظيفة عرض المنتج
        function viewProduct(title, price, img, desc) {
            document.getElementById('v-title').innerText = title;
            document.getElementById('v-price').innerText = price;
            document.getElementById('v-img').src = img;
            document.getElementById('v-desc').innerText = desc;
            openModal('productView');
        }

        function setPayment(type) {
            const vBox = document.getElementById('voda-box');
            const mVal = document.getElementById('method-val');
            if(type === 'voda') {
                vBox.style.display = 'block';
                mVal.value = "Vodafone Cash";
                document.getElementById('opt-voda').classList.add('active');
                document.getElementById('opt-cash').classList.remove('active');
            } else {
                vBox.style.display = 'none';
                mVal.value = "Cash";
                document.getElementById('opt-cash').classList.add('active');
                document.getElementById('opt-voda').classList.remove('active');
            }
        }
    </script>
</body>
</html>
