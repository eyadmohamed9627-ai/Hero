<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HERO STORE ⚡</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --electric-blue: #00f5ff;
            --dark-bg: #000000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background: var(--dark-bg);
            color: #fff; 
            overflow-x: hidden;
        }

        /* الخلفية المتحركة */
        .live-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            object-fit: cover;
            opacity: 0.15;
        }

        /* Navbar */
        .navbar { 
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; 
            background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); position: sticky; top: 0; 
            z-index: 1000; border-bottom: 1px solid rgba(0, 245, 255, 0.2);
        }
        .logo { font-family: 'Oswald', sans-serif; font-size: 1.8rem; font-weight: 900; color: #fff; letter-spacing: 2px; }
        .cart-icon { color: var(--electric-blue); font-size: 1.4rem; position: relative; cursor: pointer; }
        .badge { position: absolute; top: -8px; right: -12px; background: red; color: white; font-size: 0.7rem; padding: 2px 6px; border-radius: 50%; }

        /* Container */
        .container { 
            padding: 20px 3%; 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); /* منتجين في الصف */
            gap: 12px; 
        }

        /* الكارت الفخم الجديد */
        .product-card {
            position: relative;
            height: 400px; /* طول الكارت */
            border-radius: 20px;
            overflow: hidden;
            background: #111;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .product-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.5s ease;
        }

        .product-card:hover img {
            transform: scale(1.1);
            filter: brightness(0.6);
        }

        /* تظليل الكلام (Gradient) */
        .content-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px 15px;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 20%, transparent 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .product-name {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 5px;
            color: #fff;
        }

        .product-price {
            font-family: 'Oswald', sans-serif;
            font-size: 1.3rem;
            color: var(--electric-blue);
            margin-bottom: 15px;
        }

        /* زرار أضف للقوة */
        .add-btn {
            background: transparent;
            color: var(--electric-blue);
            border: 1.5px solid var(--electric-blue);
            padding: 10px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.3s;
        }

        .add-btn:hover {
            background: var(--electric-blue);
            color: #000;
            box-shadow: 0 0 15px var(--electric-blue);
        }

        .new-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--electric-blue);
            color: #000;
            padding: 3px 10px;
            border-radius: 8px;
            font-weight: 900;
            font-size: 0.7rem;
            z-index: 10;
        }

        /* للموبايلات الصغيرة */
        @media (max-width: 480px) {
            .product-card { height: 350px; }
            .product-name { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <img src="https://i.ibb.co/cX8hJNDx/IMG-1910.jpg" class="live-bg">

    <nav class="navbar">
        <div class="logo">HERO</div>
        <div class="cart-icon">
            <i class="fas fa-shopping-cart"></i>
            <span class="badge" id="count">0</span>
        </div>
    </nav>

    <div class="container" id="productGrid">
        
        <div class="product-card">
            <div class="new-badge">NEW</div>
            <img src="https://images.unsplash.com/photo-1521572267360-ee0c2909d518?w=600" alt="Product">
            <div class="content-overlay">
                <h3 class="product-name">تيشيرت الدرع الأسود</h3>
                <div class="product-price">EGP 450</div>
                <button class="add-btn" onclick="updateCount()">
                    <i class="fas fa-bolt"></i>
                    أضف للقوة
                </button>
            </div>
        </div>

        <div class="product-card">
            <div class="new-badge">NEW</div>
            <img src="https://images.unsplash.com/photo-1583454110551-21f2fa20019b?w=600" alt="Product">
            <div class="content-overlay">
                <h3 class="product-name">سترينجر هيرو الأصلي</h3>
                <div class="product-price">EGP 350</div>
                <button class="add-btn" onclick="updateCount()">
                    <i class="fas fa-bolt"></i>
                    أضف للقوة
                </button>
            </div>
        </div>

    </div>

    <script>
        let count = 0;
        function updateCount() {
            count++;
            document.getElementById('count').innerText = count;
        }
    </script>
</body>
</html>
