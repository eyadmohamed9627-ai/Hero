<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ جيم فاير ستور ⚡ - ملابس جيم برق وشطارة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Cairo', sans-serif; 
            background: #0a0a0a; 
            color: #fff; 
            overflow-x: hidden;
            cursor: none;
        }

        /* كورسور مخصص */
        .cursor { 
            position: fixed; 
            width: 20px; height: 20px; 
            background: radial-gradient(circle, #00f5ff, #ff00ff); 
            border-radius: 50%; 
            pointer-events: none; 
            z-index: 9999; 
            transition: transform 0.1s; 
            box-shadow: 0 0 20px #00f5ff;
        }
        .cursor.grow { transform: scale(2); }

        /* الخلفية المتحركة */
        .bg-animation {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: 
                radial-gradient(circle at 20% 80%, rgba(120,119,198,0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255,119,198,0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(120,219,255,0.3) 0%, transparent 50%);
            animation: bgMove 20s ease infinite;
        }
        @keyframes bgMove {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(180deg); }
        }

        /* الهيدر المتوهج */
        header { 
            background: linear-gradient(45deg, #000, #1a1a2e, #16213e); 
            backdrop-filter: blur(20px);
            border-bottom: 2px solid #00f5ff;
            padding: 1rem 0; 
            position: fixed; 
            width: 100%; 
            top: 0; 
            z-index: 100;
            box-shadow: 0 0 50px rgba(0,245,255,0.5);
        }
        nav { 
            max-width: 1400px; 
            margin: 0 auto; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0 3rem; 
        }
        .logo { 
            font-size: 2.5rem; 
            font-weight: 900; 
            background: linear-gradient(45deg, #00f5ff, #ff00ff, #00ff88); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            text-shadow: 0 0 30px rgba(0,245,255,0.8);
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { filter: drop-shadow(0 0 10px #00f5ff); }
            to { filter: drop-shadow(0 0 30px #ff00ff); }
        }

        /* الكارت المتوهج */
        .cart { 
            background: rgba(255,255,255,0.1); 
            backdrop-filter: blur(10px);
            padding: 1rem 2rem; 
            border-radius: 50px; 
            border: 2px solid #00f5ff; 
            cursor: pointer; 
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .cart::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(0,245,255,0.3), transparent);
            transform: rotate(45deg); transition: 0.5s;
        }
        .cart:hover::before { animation: shine 0.5s; }
        @keyframes shine { 0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); } 100% { transform: translateX(100%) translateY(100%) rotate(45deg); } }
        .cart:hover { transform: scale(1.1); box-shadow: 0 0 50px #00f5ff; }
        .cart span { 
            background: linear-gradient(45deg, #ff4757, #ff00ff); 
            color: white; 
            border-radius: 50%; 
            padding: 0.3rem 0.8rem; 
            font-size: 1rem; 
            font-weight: bold;
            box-shadow: 0 0 20px #ff4757;
        }

        /* الهيرو الخارق */
        .hero { 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            position: relative;
            margin-top: 80px;
            overflow: hidden;
        }
        .hero::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(45deg, rgba(0,10,20,0.8), rgba(26,26,46,0.6));
            backdrop-filter: blur(10px);
        }
        .hero-content { position: relative; z-index: 2; }
        .hero h1 { 
            font-size: 5rem; 
            font-weight: 900; 
            background: linear-gradient(45deg, #00f5ff, #ff00ff, #00ff88, #ffff00); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            margin-bottom: 1.5rem;
            animation: titleGlow 3s ease-in-out infinite alternate;
            text-shadow: 0 0 50px rgba(0,245,255,0.8);
        }
        @keyframes titleGlow {
            0% { filter: drop-shadow(0 0 20px #00f5ff); text-shadow: 0 0 50px rgba(0,245,255,0.8); }
            100% { filter: drop-shadow(0 0 40px #ff00ff); text-shadow: 0 0 80px rgba(255,0,255,1); }
        }
        .hero p { font-size: 1.8rem; margin-bottom: 3rem; opacity: 0.9; }
        .cta { 
            background: linear-gradient(45deg, #ff00ff, #00f5ff); 
            color: #000; 
            padding: 1.5rem 4rem; 
            border: none; 
            border-radius: 100px; 
            font-size: 1.5rem; 
            font-weight: 900; 
            cursor: pointer; 
            text-decoration: none; 
            display: inline-block;
            box-shadow: 0 20px 40px rgba(255,0,255,0.4);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .cta:hover { 
            transform: translateY(-10px) scale(1.05); 
            box-shadow: 0 30px 60px rgba(0,245,255,0.6);
        }

        /* المنتجات المتفجرة */
        .products { 
            max-width: 1400px; 
            margin: 6rem auto; 
            padding: 0 3rem; 
        }
        .products h2 { 
            text-align: center; 
            font-size: 4rem; 
            margin-bottom: 4rem; 
            background: linear-gradient(45deg, #00f5ff, #ff00ff); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            position: relative;
        }
        .products h2::after {
            content: ''; position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%);
            width: 100px; height: 4px; background: linear-gradient(90deg, #00f5ff, #ff00ff); border-radius: 2px;
        }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); 
            gap: 3rem; 
        }

        .product-card { 
            background: rgba(255,255,255,0.05); 
            backdrop-filter: blur(20px);
            border-radius: 25px; 
            overflow: hidden; 
            border: 2px solid rgba(0,245,255,0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }
        .product-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(45deg, transparent, rgba(0,245,255,0.1), transparent);
            opacity: 0; transition: opacity 0.3s;
        }
        .product-card:hover::before { opacity: 1; }
        .product-card:hover { 
            transform: translateY(-20px) rotateX(10deg) rotateY(10deg) scale(1.02); 
            border-color: #00f5ff;
            box-shadow: 0 50px 100px rgba(0,245,255,0.4), 0 0 100px rgba(255,0,255,0.3);
        }
        .product-img { 
            width: 100%; 
            height: 300px; 
            object-fit: cover; 
            filter: brightness(1.1) contrast(1.2);
            transition: filter 0.3s;
        }
        .product-card:hover .product-img { filter: brightness(1.3) sepia(0.2) hue-rotate(200deg); }
        .product-info { padding: 2.5rem; text-align: center; }
        .product-info h3 { 
            font-size: 2rem; 
            margin-bottom: 1rem; 
            background: linear-gradient(45deg, #fff, #00f5ff); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
        }
        .price { 
            font-size: 2.5rem; 
            font-weight: 900; 
            color: #00ff88; 
            margin-bottom: 2rem;
            text-shadow: 0 0 20px #00ff88;
        }
        .add-to-cart { 
            width: 100%; 
            background: linear-gradient(45deg, #ff00ff, #00f5ff, #00ff88); 
            color: #000; 
            border: none; 
            padding: 1.5rem; 
            border-radius: 20px; 
            font-size: 1.3rem; 
            font-weight: 900; 
            cursor: pointer; 
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(255,0,255,0.4);
        }
        .add-to-cart:hover { 
            transform: scale(1.05); 
            box-shadow: 0 20px 50px rgba(0,245,255,0.6);
        }

        /* الكارت مودال الفخم */
        .cart-modal { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.95); 
            backdrop-filter: blur(30px);
            z-index: 200; 
        }
        .cart-content { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            background: rgba(10,10,26,0.95); 
            backdrop-filter: blur(30px);
            padding: 3rem; 
            border-radius: 30px; 
            border: 2px solid #00f5ff;
            max-width: 600px; 
            width: 90%; 
            max-height: 80vh; 
            overflow-y: auto;
            box-shadow: 0 0 100px rgba(0,245,255,0.5);
        }
        .close { 
            float: left; 
            font-size: 3rem; 
            cursor: pointer; 
            color: #00f5ff; 
            transition: 0.3s;
        }
        .close:hover { transform: rotate(90deg) scale(1.2); color: #ff00ff; }
        .cart-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 1.5rem 0; 
            border-bottom: 1px solid rgba(0,245,255,0.3); 
            transition: 0.3s;
        }
        .cart-item:hover { background: rgba(0,245,255,0.1); border-radius: 15px; padding: 1.5rem; }
        .total { 
            font-size: 2.5rem; 
            font-weight: 900; 
            margin-top: 2rem; 
            text-align: center; 
            color: #00ff88;
            text-shadow: 0 0 30px #00ff88;
        }
        .checkout { 
            width: 100%; 
            background: linear-gradient(45deg, #00ff88, #00f5ff); 
            color: #000; 
            border: none; 
            padding: 1.5rem; 
            border-radius: 25px; 
            font-size: 1.5rem; 
            font-weight: 900; 
            cursor: pointer; 
            margin-top: 2rem;
            box-shadow: 0 20px 50px rgba(0,255,136,0.5);
        }

        /* الفوتر */
        footer { 
            background: linear-gradient(180deg, #000, #1a1a2e); 
            text-align: center; 
            padding: 4rem 3rem; 
            border-top: 2px solid #00f5ff;
            box-shadow: 0 -50px 100px rgba(0,245,255,0.2);
        }

        /* موبايل */
        @media (max-width: 768px) {
            .hero h1 { font-size: 3rem; }
            .grid { grid-template-columns: 1fr; gap: 2rem; }
            nav { padding: 0 1.5rem; }
            .logo { font-size: 2rem; }
        }

        /* تأثيرات إضافية */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        .product-card:nth-child(odd) { animation: float 6s ease-in-out infinite; }
        .product-card:nth-child(even) { animation: float 6s ease-in-out infinite 3s; }
    </style>
</head>
<body>
    <!-- الكورسور -->
    <div class="cursor" id="cursor"></div>

    <!-- الخلفية المتحركة -->
    <div class="bg-animation"></div>

    <!-- الهيدر -->
    <header>
        <nav>
            <div class="logo">⚡ جيم فاير ⚡</div>
            <div class="cart" onclick="toggleCart()">
                🛒 السلة <span id="cart-count">0</span>
            </div>
        </nav>
    </header>

    <!-- الهيرو -->
    <section class="hero">
        <div class="hero-content">
            <h1>ملابس جيم برق 🔥</h1>
            <p>شطارة وأناقة في نفس الوقت 💪</p>
            <a href="#products" class="cta">🛒 اشتري دلوقتي</a>
        </div>
    </section>

    <!-- المنتجات -->
    <section class="products" id="products">
        <h2>🔥 المجموعة الجديدة 🔥</h2>
        <div class="grid">
            <div class="product-card">
                <img class="product-img" src="https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?w=500&h=300&fit=crop" alt="ليقنز">
                <div class="product-info">
                    <h3>ليقنز برو ⚡</h3>
                    <div class="price">٤٩ جنيه</div>
                    <button class="add-to-cart" onclick="addToCart('ليقنز برو ⚡', 49)">أضف للسلة 🔥</button>
                </div>
            </div>
            <div class="product-card">
                <img class="product-img" src="https://images.unsplash.com/photo-1581556562205-137e1029a880?w=500&h=300&fit=crop" alt="سبرتس برا">
                <div class="product-info">
                    <h3>سبرتس برا 💥</h3>
