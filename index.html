<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HERO STORE ⚡ - الوحش اللي جواك</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --electric-blue: #00f5ff;
            --thunder-purple: #9d00ff;
            --dark-void: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            /* الخلفية الجديدة مع صورة البرق */
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://i.ibb.co/cX8hJNDx/IMG-1910.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed; /* الخلفية ثابتة مع السكرول */
            color: #fff; 
            overflow-x: hidden;
        }

        /* الهيدر */
        header {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--electric-blue);
            padding: 1rem 5%;
            position: sticky;
            width: 100%;
            top: 0; z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Oswald', sans-serif;
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: 3px;
            color: #fff;
            text-shadow: 0 0 15px var(--electric-blue), 0 0 25px var(--electric-blue);
            text-transform: uppercase;
        }

        /* حاوية السلة */
        .cart-icon {
            position: relative;
            cursor: pointer;
            font-size: 1.5rem;
            color: var(--electric-blue);
            transition: 0.3s;
        }
        .cart-icon:hover { transform: scale(1.1); color: #fff; }
        .badge {
            position: absolute;
            top: -10px; right: -15px;
            background: var(--thunder-purple);
            color: white;
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 50%;
            box-shadow: 0 0 10px var(--thunder-purple);
        }

        /* الهيرو سيكشن */
        .hero {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle, rgba(0, 245, 255, 0.1) 0%, transparent 70%);
        }

        .hero h1 {
            font-size: 5rem;
            font-family: 'Oswald', sans-serif;
            font-weight: 900;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px var(--electric-blue));
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 1.2rem;
            letter-spacing: 3px;
            color: var(--electric-blue);
            text-transform: uppercase;
            font-weight: bold;
        }

        /* حاوية المنتجات - معدلة لتكون صفين */
        .container {
            padding: 50px 5%;
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* صفين ثابتين */
            gap: 25px; /* مسافة بين المنتجات */
        }

        /* كروت المنتجات - ستايل زجاجي شفاف */
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            overflow: hidden;
            transition: 0.4s ease-in-out;
            position: relative;
        }

        .card:hover {
            border-color: var(--electric-blue);
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(0, 245, 255, 0.3);
        }

        .card img {
            width: 100%;
            height: 380px; /* طول الصورة مناسب للوحوش */
            object-fit: cover;
            filter: grayscale(0.6) contrast(1.1);
            transition: 0.4s;
        }

        .card:hover img { filter: grayscale(0); transform: scale(1.05); }

        .card-info {
            padding: 20px;
            background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.8));
        }

        .card-info h3 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 5px;
            color: #fff;
        }

        .price {
            font-size: 1.6rem;
            color: var(--electric-blue);
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .buy-btn {
            width: 100%;
            padding: 15px;
            background: transparent;
            color: var(--electric-blue);
            border: 2px solid var(--electric-blue);
            border-radius: 10px;
            font-family: 'Oswald', sans-serif;
            font-weight: 900;
            font-size: 1.1rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .buy-btn:hover {
            background: var(--electric-blue);
            color: #000;
            box-shadow: 0 0 20px var(--electric-blue);
        }

        /* تعديل للموبايل */
        @media (max-width: 600px) {
            .container { grid-template-columns: 1fr; } /* صف واحد على الموبايل */
            .hero h1 { font-size: 3.5rem; }
            .card img { height: 280px; }
        }

    </style>
</head>
<body>

    <header>
        <div class="logo">HERO</div>
        <div class="cart-icon">
            <i class="fas fa-shopping-cart"></i>
            <span class="badge" id="count">0</span>
        </div>
    </header>

    <section class="hero">
        <h1>HERO STORE</h1>
        <p>AWAKEN THE BEAST WITHIN ⚡</p>
    </section>

    <div class="container">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1583454110551-21f2fa20019b?w=600" alt="Product">
            <div class="card-info">
                <h3>سترينجر "هيرو" الأصلي</h3>
                <div class="price">350 EGP</div>
                <button class="buy-btn" onclick="add()">
                    أضف للقوة
                    <i class="fas fa-bolt"></i>
                </button>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1521572267360-ee0c2909d518?w=600" alt="Product">
            <div class="card-info">
                <h3>تيشيرت الدرع الأسود</h3>
                <div class="price">450 EGP</div>
                <button class="buy-btn" onclick="add()">
                    أضف للقوة
                    <i class="fas fa-bolt"></i>
                </button>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1506629082955-511b1aa562c8?w=600" alt="Product">
            <div class="card-info">
                <h3>بنطلون تايتان برو</h3>
                <div class="price">600 EGP</div>
                <button class="buy-btn" onclick="add()">
                    أضف للقوة
                    <i class="fas fa-bolt"></i>
                </button>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1556813820-673c2f92d46a?w=600" alt="Product">
            <div class="card-info">
                <h3>هودى "الوحش" الشتوي</h3>
                <div class="price">850 EGP</div>
                <button class="buy-btn" onclick="add()">
                    أضف للقوة
                    <i class="fas fa-bolt"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        let counter = 0;
        function add() {
            counter++;
            document.getElementById('count').innerText = counter;
            // تأثير رعشة خفيفة عند الضغط
            document.body.style.animation = "shake 0.2s cubic-bezier(.36,.07,.19,.97) both";
            setTimeout(() => { document.body.style.animation = "" }, 200);
        }
    </script>

    <style>
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-3px, 0, 0); }
        }
    </style>

</body>
</html>
