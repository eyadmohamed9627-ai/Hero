<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HERO STORE ⚡ - الوحش اللي جواك</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --electric-blue: #00f5ff;
            --thunder-purple: #9d00ff;
            --dark-void: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Cairo', sans-serif; 
            background: var(--dark-void); 
            color: #fff; 
            overflow-x: hidden;
        }

        /* فيديو البرق في الخلفية */
        .thunder-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            object-fit: cover;
            opacity: 0.4;
            filter: saturate(1.5) contrast(1.2);
        }

        /* الهيدر */
        header {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--electric-blue);
            padding: 1rem 5%;
            position: fixed;
            width: 100%;
            top: 0; z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Oswald', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 5px;
            color: #fff;
            text-shadow: 0 0 10px var(--electric-blue), 0 0 20px var(--electric-blue);
            text-transform: uppercase;
        }

        /* الهيرو سيكشن */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle, rgba(0, 245, 255, 0.1) 0%, transparent 70%);
        }

        .hero h1 {
            font-size: 6rem;
            font-family: 'Oswald', sans-serif;
            font-weight: 900;
            background: linear-gradient(to bottom, #fff, #666);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px var(--electric-blue));
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 1.5rem;
            letter-spacing: 3px;
            color: var(--electric-blue);
            text-transform: uppercase;
            font-weight: bold;
        }

        /* كروت المنتجات */
        .container {
            padding: 100px 5%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .card {
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid #333;
            border-radius: 0; /* شكل حاد للرجولة */
            overflow: hidden;
            transition: 0.4s;
            position: relative;
        }

        .card:hover {
            border-color: var(--electric-blue);
            transform: scale(1.03) translateY(-10px);
            box-shadow: 0 0 30px rgba(0, 245, 255, 0.3);
        }

        .card img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            filter: grayscale(0.5);
            transition: 0.4s;
        }

        .card:hover img { filter: grayscale(0); }

        .card-info {
            padding: 20px;
            border-top: 2px solid var(--thunder-purple);
        }

        .price {
            font-size: 1.8rem;
            color: var(--electric-blue);
            font-weight: 900;
            margin: 10px 0;
        }

        .buy-btn {
            width: 100%;
            padding: 15px;
            background: var(--electric-blue);
            color: #000;
            border: none;
            font-family: 'Oswald', sans-serif;
            font-weight: 900;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .buy-btn:hover {
            background: #fff;
            box-shadow: 0 0 20px #fff;
        }

        /* تأثير الرعد المتنقل */
        .bolt {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            box-shadow: inset 0 0 50px rgba(0, 245, 255, 0.1);
        }

    </style>
</head>
<body>

    <video autoplay muted loop class="thunder-bg">
        <source src="https://assets.mixkit.co/videos/preview/mixkit-thunderbolt-striking-in-the-dark-sky-1834-large.mp4" type="video/mp4">
    </video>

    <header>
        <div class="logo">HERO</div>
        <div style="font-size: 1.5rem; cursor: pointer;">🛒 <span id="count">0</span></div>
    </header>

    <section class="hero">
        <h1>HERO STORE</h1>
        <p>لا مكان للضعفاء.. فقط الوحوش ⚡</p>
    </section>

    <div class="container">
        <div class="card">
            <div class="bolt"></div>
            <img src="https://images.unsplash.com/photo-1583454110551-21f2fa20019b?w=500" alt="Gym Wear">
            <div class="card-info">
                <h3>تيشيرت "الدرع" الماص للعرق</h3>
                <div class="price">450 EGP</div>
                <button class="buy-btn" onclick="add()">أضف للقوة 🔥</button>
            </div>
        </div>

        <div class="card">
            <div class="bolt"></div>
            <img src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438?w=500" alt="Gym Wear">
            <div class="card-info">
                <h3>بنطلون "التايتان" ليجنجز</h3>
                <div class="price">600 EGP</div>
                <button class="buy-btn" onclick="add()">أضف للقوة 🔥</button>
            </div>
        </div>

        <div class="card">
            <div class="bolt"></div>
            <img src="https://images.unsplash.com/photo-1574680096145-d05b474e2155?w=500" alt="Gym Wear">
            <div class="card-info">
                <h3>سترينجر "هيرو" الأصلي</h3>
                <div class="price">350 EGP</div>
                <button class="buy-btn" onclick="add()">أضف للقوة 🔥</button>
            </div>
        </div>
    </div>

    <script>
        let counter = 0;
        function add() {
            counter++;
            document.getElementById('count').innerText = counter;
            // تأثير رعشة خفيفة عند الضغط
            document.body.style.animation = "shake 0.2s cubic-bezier(.36,.07,.19,.97) both";
            setTimeout(() => { document.body.style.animation = "" }, 200);
        }
    </script>

    <style>
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>

</body>
</html>
