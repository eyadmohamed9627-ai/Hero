<div class="cart-page" id="cartPage">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 style="color:var(--electric-blue)">سلة الأبطال ⚡</h2>
        <i class="fas fa-arrow-left" onclick="closeCart()" style="font-size:1.8rem; cursor:pointer"></i>
    </div>
    
    <div id="cartList" style="flex:0.4; overflow-y:auto; border-bottom:1px solid #222; margin-bottom:15px;"></div>
    
    <div id="totalPrice" style="text-align:center; padding:10px; font-size:1.3rem; color:var(--electric-blue); font-weight:900;">الإجمالي: 0 EGP</div>
    
    <form action="https://formspree.io/f/xjgjkvqv" method="POST" enctype="multipart/form-data" style="background:#080808; padding:15px; border-radius:15px; border:1px solid #222; flex:1; overflow-y:auto;">
        <input type="hidden" name="Order_Items" id="orderData">
        
        <input type="text" name="Name" placeholder="الاسم الكامل" required style="width:100%; padding:12px; margin-bottom:10px; background:#000; color:#fff; border:1px solid #333; border-radius:8px;">
        
        <input type="tel" name="Phone" placeholder="رقم الهاتف (واتساب)" required style="width:100%; padding:12px; margin-bottom:10px; background:#000; color:#fff; border:1px solid #333; border-radius:8px;">
        
        <input type="text" name="Address" placeholder="العنوان بالتفصيل" required style="width:100%; padding:12px; margin-bottom:15px; background:#000; color:#fff; border:1px solid #333; border-radius:8px;">

        <div style="margin-bottom:15px;">
            <p style="color:var(--electric-blue); font-size:0.9rem; margin-bottom:10px;">طريقة الدفع:</p>
            
            <label style="display:block; margin-bottom:8px; cursor:pointer;">
                <input type="radio" name="Payment_Method" value="عند الاستلام" checked onclick="toggleVodafone(false)"> 
                <span>عند الاستلام 🤝</span>
            </label>
            
            <label style="display:block; cursor:pointer;">
                <input type="radio" name="Payment_Method" value="فودافون كاش" onclick="toggleVodafone(true)"> 
                <span>فودافون كاش ⚡</span>
            </label>
        </div>

        <div id="vodafoneDetails" style="display:none; background:#111; padding:10px; border:1px dashed var(--electric-blue); border-radius:8px; margin-bottom:15px;">
            <p style="font-size:0.8rem; color:#fff;">يرجى تحويل المبلغ إلى الرقم التالي:</p>
            <p style="font-size:1.1rem; color:var(--electric-blue); font-weight:bold; text-align:center; letter-spacing:1px;">01018758798</p>
            <p style="font-size:0.7rem; color:#888; margin-top:5px;">* يرجى إرفاق صورة التحويل أو كتابة رقم الراسل في ملاحظات الطلب.</p>
            <input type="file" name="Transfer_Screenshot" accept="image/*" style="margin-top:10px; font-size:0.7rem;">
        </div>

        <button type="submit" class="add-btn">إرسال الطلب 🚀</button>
    </form>
</div>

<script>
    // دالة لإظهار/إخفاء تفاصيل فودافون كاش
    function toggleVodafone(show) {
        document.getElementById('vodafoneDetails').style.display = show ? 'block' : 'none';
    }

    // --- بقية الأكواد الخاصة بك مع تعديل بسيط في الأسعار (للتجربة) ---
    const products = [
        { id: 1, name: "سترينجر هيرو - أسود", price: 450, img: "https://i.ibb.co/xKpLR6Rd/EFECD71-E-C885-4-E55-8-DC8-2-E2-A4-A0-DB76-C.jpg", desc: "خامة قطنية ممتازة بتصميم هيرو الفريد." },
        { id: 2, name: "تيشيرت الوحش", price: 550, img: "https://i.ibb.co/xKpLR6Rd/EFECD71-E-C885-4-E55-8-DC8-2-E2-A4-A0-DB76-C.jpg", desc: "تيشيرت رياضي طارد للعرق ومناسب للتمارين الشاقة." },
        { id: 3, name: "بنطلون برو جوجر", price: 650, img: "https://i.ibb.co/xKpLR6Rd/EFECD71-E-C885-4-E55-8-DC8-2-E2-A4-A0-DB76-C.jpg", desc: "مرونة كاملة في الحركة مع جيوب مؤمنة." },
        { id: 4, name: "هودي هيرو ثيرمال", price: 850, img: "https://i.ibb.co/xKpLR6Rd/EFECD71-E-C885-4-E55-8-DC8-2-E2-A4-A0-DB76-C.jpg", desc: "تدفئة مثالية بتصميم يبرز القوة." }
    ];

    let cart = [];

    function renderProducts() {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = products.map(p => `
            <div class="card" onclick="viewProduct(${p.id})">
                <div class="img-box"><img src="${p.img}"></div>
                <div class="info-box">
                    <h3>${p.name}</h3>
                    <div class="price">${p.price} EGP</div>
                    <div style="font-size:0.6rem; color:var(--electric-blue); margin-top:5px;">عرض التفاصيل ⚡</div>
                </div>
            </div>
        `).join('');
    }

    function viewProduct(id) {
        const p = products.find(prod => prod.id === id);
        const body = document.getElementById('overlayBody');
        body.innerHTML = `
            <img src="${p.img}" class="overlay-img">
            <div class="overlay-info">
                <h1 style="font-family:'Oswald'; font-size:2rem; margin-bottom:10px;">${p.name}</h1>
                <div class="price" style="font-size:1.8rem; margin-bottom:15px;">${p.price} EGP</div>
                <p style="color:#aaa; line-height:1.6;">${p.desc}</p>
                <button class="add-btn" onclick="addToCart(${p.id}); closeOverlay();">إضافة إلى السلة 🔥</button>
            </div>
        `;
        document.getElementById('productOverlay').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function closeOverlay() {
        document.getElementById('productOverlay').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    function addToCart(id) {
        const product = products.find(p => p.id === id);
        cart.push(product);
        updateCart();
    }

    function updateCart() {
        document.getElementById('cartBadge').innerText = cart.length;
        let total = 0;
        let summary = "";
        const list = document.getElementById('cartList');
        list.innerHTML = cart.map((item, index) => {
            total += item.price;
            summary += `- ${item.name} (${item.price} EGP)\n`;
            return `<div style="display:flex; justify-content:space-between; align-items:center; padding:8px; background:#111; margin-bottom:8px; border-radius:8px; font-size:0.8rem;">
                <span>${item.name}</span>
                <span>${item.price} EGP</span>
            </div>`;
        }).join('');
        document.getElementById('totalPrice').innerText = "الإجمالي: " + total + " EGP";
        document.getElementById('orderData').value = summary + "\nالإجمالي الكلي: " + total + " EGP";
    }

    function openCart() { 
        if(cart.length == 0) return alert("السلة فاضية!");
        document.getElementById('cartPage').style.display = 'flex'; 
    }
    function closeCart() { document.getElementById('cartPage').style.display = 'none'; }

    renderProducts();
</script>
