<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HERO STORE ⚡</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --electric-blue: #00f5ff; --dark-bg: #050505; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: var(--dark-bg); color: #fff; }
        
        .navbar { padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; background: #000; border-bottom: 2px solid var(--electric-blue); position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Oswald'; font-size: 2rem; font-weight: 900; text-shadow: 0 0 10px var(--electric-blue); }
        .cart-btn { color: var(--electric-blue); font-size: 1.8rem; cursor: pointer; position: relative; }
        .badge { position: absolute; top: -5px; right: -10px; background: red; font-size: 0.7rem; padding: 2px 6px; border-radius: 50%; }

        .container { padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: #111; border-radius: 15px; overflow: hidden; border: 1px solid #222; text-align: center; padding-bottom: 10px; }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .price { color: var(--electric-blue); font-family: 'Oswald'; font-size: 1.4rem; margin: 10px 0; }
        .add-btn { background: var(--electric-blue); color: #000; border: none; padding: 10px; width: 90%; border-radius: 8px; font-weight: 900; cursor: pointer; }

        /* المودال */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: none; flex-direction: column; padding: 20px; overflow-y: auto; }
        .payment-option { border: 1px solid #333; padding: 15px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; transition: 0.3s; }
        .payment-option.active { border-color: var(--electric-blue); background: rgba(0, 245, 255, 0.05); }
        
        input, select { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #333; background: #111; color: #fff; text-align: right; }
        .checkout-btn { background: var(--electric-blue); color: #000; border: none; padding: 15px; border-radius: 8px; font-weight: 900; margin-top: 20px; width: 100%; cursor: pointer; }
        
        #voda-box { background: #1a0000; padding: 15px; border-radius: 10px; border: 1px solid #e60000; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">HERO</div>
        <div class="cart-btn" onclick="openCart()">
            <i class="fas fa-bolt"></i>
            <span class="badge" id="count">0</span>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1521572267360-ee0c2909d518?w=600">
            <div class="price">450 EGP</div>
            <button class="add-btn" onclick="add()">أضف للقوة</button>
        </div>
    </div>

    <div class="modal" id="cartModal">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="color:var(--electric-blue)">معداتك ⚡</h2>
            <i class="fas fa-times" onclick="closeCart()" style="font-size:1.5rem"></i>
        </div>

        <div style="margin-top:20px;">
            <p>اختر طريقة الدفع:</p>
            
            <div class="payment-option active" id="opt-cash" onclick="setPayment('cash')">
                <i class="fas fa-money-bill-wave"></i> كاش عند الاستلام
            </div>

            <div class="payment-option" id="opt-voda" onclick="setPayment('voda')">
                <i class="fas fa-mobile-alt"></i> فودافون كاش
            </div>

            <div id="voda-box">
                <p style="text-align:center">حول المبلغ على رقم الموبايل: <br> 
                <strong style="color:#e60000; font-size:1.3rem;">010XXXXXXXX</strong></p> <p style="font-size:0.8rem; margin-top:10px;">ارفع سكرين شوت التحويل هنا:</p>
                <input type="file" name="transfer_proof" accept="image/*" style="border:none; padding:0;">
            </div>
        </div>

        <form action="https://formspree.io/f/xjgjkvqv" method="POST" enctype="multipart/form-data">
            <input type="hidden" name="Payment_Method" id="method-val" value="Cash on Delivery">
            <input type="text" name="Name" placeholder="الاسم بالكامل" required>
            <input type="tel" name="Phone" placeholder="رقم الموبايل" required>
            <input type="text" name="Address" placeholder="العنوان بالتفصيل" required>
            <button type="submit" class="checkout-btn">تأكيد الطلب 🚀</button>
        </form>
    </div>

    <script>
        let cart = 0;
        function add() { cart++; document.getElementById('count').innerText = cart; }
        function openCart() { document.getElementById('cartModal').style.display = 'flex'; }
        function closeCart() { document.getElementById('cartModal').style.display = 'none'; }

        function setPayment(type) {
            const vodaBox = document.getElementById('voda-box');
            const optVoda = document.getElementById('opt-voda');
            const optCash = document.getElementById('opt-cash');
            const methodInput = document.getElementById('method-val');

            if(type === 'voda') {
                vodaBox.style.display = 'block';
                optVoda.classList.add('active');
                optCash.classList.remove('active');
                methodInput.value = "Vodafone Cash";
            } else {
                vodaBox.style.display = 'none';
                optVoda.classList.remove('active');
                optCash.classList.add('active');
                methodInput.value = "Cash on Delivery";
            }
        }
    </script>
</body>
</html>
