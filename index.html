<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HERO STORE ⚡ | معدات الوحوش</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --electric-blue: #00f5ff;
            --dark-bg: #000000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--dark-bg); color: #fff; overflow-x: hidden; }

        /* 1. تغميق الخلفية وتأثير البرق */
        .thunder-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; background: url('https://i.ibb.co/cX8hJNDx/IMG-1910.jpg') center/cover no-repeat fixed;
            opacity: 0.15; /* غمقنا الخلفية هنا */
            filter: brightness(0.3);
            animation: thunderStrike 8s infinite;
        }
        @keyframes thunderStrike {
            0%, 92%, 96%, 100% { opacity: 0.15; filter: brightness(0.3); }
            94% { opacity: 0.5; filter: brightness(1.5) contrast(1.2); }
        }

        .navbar { 
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; 
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid var(--electric-blue);
        }
        .logo { font-family: 'Oswald', sans-serif; font-size: 1.8rem; text-shadow: 0 0 10px var(--electric-blue); }
        .cart-bolt { position: relative; cursor: pointer; color: var(--electric-blue); font-size: 1.8rem; }
        .badge { position: absolute; top: -5px; right: -12px; background: red; color: #fff; font-size: 0.7rem; padding: 2px 6px; border-radius: 50%; }

        .brand-header { text-align: center; padding: 40px 20px; }
        .brand-header h1 { font-family: 'Oswald', sans-serif; font-size: 3.5rem; text-shadow: 0 0 20px var(--electric-blue); }

        /* المنتجات صفين */
        .container { padding: 20px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .card { background: rgba(255, 255, 255, 0.03); border-radius: 12px; border: 1px solid rgba(0, 245, 255, 0.1); overflow: hidden; transition: 0.3s; cursor: pointer; }
        .card:hover { border-color: var(--electric-blue); transform: translateY(-5px); }
        .card img { width: 100%; height: 180px; object-fit: cover; }
        .card-info { padding: 10px; text-align: center; }

        /* 2. صفحة عرض المنتج (Overlay) */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 2000; display: none; overflow-y: auto;
        }
        .close-btn { position: absolute; top: 20px; left: 20px; font-size: 2.5rem; color: var(--electric-blue); cursor: pointer; z-index: 2001; }
        .overlay-content { text-align: right; }
        .overlay-img { width: 100%; max-height: 50vh; object-fit: cover; border-bottom: 2px solid var(--electric-blue); }
        .overlay-details { padding: 30px 20px; }
        .overlay-details h1 { font-family: 'Oswald'; font-size: 2.2rem; margin-bottom: 10px; }
        .overlay-details p { color: #aaa; line-height: 1.8; margin-bottom: 20px; }

        /* السلة والدفع */
        .cart-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 3000; display: none; flex-direction: column; padding: 20px; overflow-y: auto; }
        .input-hero { width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: #fff; border-radius: 8px; margin-bottom: 15px; outline: none; }
        .confirm-btn { width: 100%; padding: 18px; background: var(--electric-blue); color: #000; border: none; border-radius: 10px; font-weight: 900; font-size: 1.2rem; cursor: pointer; }
        
        .pay-btn { padding: 10px 20px; border: 1px solid #333; background: #111; color: #fff; border-radius: 8px; cursor: pointer; margin-left: 10px; }
        .pay-btn.active { border-color: var(--electric-blue); color: var(--electric-blue); }
        .voda-info { background: #111; border: 1px dashed var(--electric-blue); padding: 15px; border-radius: 10px; margin: 15px 0; display: none; text-align: center; }
    </style>
</head>
<body>

    <div class="thunder-bg"></div>

    <nav class="navbar">
        <div class="logo">HERO</div>
        <div class="cart-bolt" onclick="openCart()">
            <i class="fas fa-bolt"></i>
            <span class="badge" id="cartBadge">0</span>
        </div>
    </nav>

    <div class="brand-header">
        <h1>HERO STORE</h1>
        <p style="color:var(--electric-blue); letter-spacing:3px;">SHOP NOW</p>
    </div>

    <div class="container" id="productGrid"></div>

    <div class="overlay" id="productOverlay">
        <i class="fas fa-times close-btn" onclick="closeOverlay()"></i>
        <div id="overlayBody" class="overlay-content"></div>
    </div>

    <div class="cart-page" id="cartPage">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="color:var(--electric-blue)">تأكيد الطلب ⚡</h2>
            <i class="fas fa-arrow-left" onclick="closeCart()" style="font-size:1.8rem; cursor:pointer"></i>
        </div>
        <div id="cartList" style="margin-bottom:20px;"></div>
        
        <form action="https://formspree.io/f/xjgjkvqv" method="POST" enctype="multipart/form-data">
            <input type="hidden" name="Order_Details" id="orderData">
            <input type="hidden" name="Payment_Method" id="methodData" value="Cash">
            
            <input type="text" name="Name" class="input-hero" required placeholder="الاسم بالكامل">
            <input type="tel" name="Phone" class="input-hero" required placeholder="رقم الموبايل">
            <input type="text" name="Address" class="input-hero" required placeholder="العنوان بالتفصيل">

            <div style="margin-bottom:15px;">
                <p style="color:var(--electric-blue); margin-bottom:10px;">طريقة الدفع:</p>
                <button type="button" class="pay-btn active" id="btnCash" onclick="setPayment('Cash')">كاش</button>
                <button type="button" class="pay-btn" id="btnVoda" onclick="setPayment('Vodafone')">فودافون كاش</button>
            </div>

            <div class="voda-info" id="vodaDetails">
                <p>حول على رقم: <b style="color:var(--electric-blue)">01018758798</b></p>
                <p style="font-size:0.8rem; margin-top:10px;">ارفع سكرين التحويل هنا:</p>
                <input type="file" name="Screenshot" class="input-hero">
            </div>

            <div id="totalPrice" style="text-align:center; padding:20px; font-size:1.5rem; color:var(--electric-blue)"></div>
            <button type="submit" class="confirm-btn">إرسال الطلب للبريد 🚀</button>
        </form>
    </div>

    <script>
        const products = [
            { id: 1, name: "سترينجر هيرو - أسود", price: 350, img: "https://images.unsplash.com/photo-1583454110551-21f2fa20019b?w=600", desc: "خامة قطنية ليكرا، قصة تبرز العضلات، مثالية للتمارين الشاقة." },
            { id: 2, name: "تيشيرت الوحش", price: 450, img: "https://images.unsplash.com/photo-1521572267360-ee0c2909d518?w=600", desc: "تقنية طرد العرق، مريح جداً، وتصميم عصري." },
            { id: 3, name: "بنطلون برو جوجر", price: 600, img: "https://images.unsplash.com/photo-1506629082955-511b1aa562c8?w=600", desc: "مرونة كاملة في السكوات، جيوب بسوستة مؤمنة." },
            { id: 4, name: "هودي هيرو ثيرمال", price: 850, img: "https://images.unsplash.com/photo-1556813820-673c2f92d46a?w=600", desc: "تدفئة عالية للخروج أو التسخين قبل التمرين." }
        ];

        let cart = [];

        function renderProducts() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = products.map(p => `
                <div class="card" onclick="openProduct(${p.id})">
                    <img src="${p.img}">
                    <div class="card-info">
                        <h3>${p.name}</h3>
                        <div style="color:var(--electric-blue)">${p.price} EGP</div>
                    </div>
                </div>
            `).join('');
        }

        function openProduct(id) {
            const p = products.find(prod => prod.id === id);
            const body = document.getElementById('overlayBody');
            body.innerHTML = `
                <img src="${p.img}" class="overlay-img">
                <div class="overlay-details">
                    <h1>${p.name}</h1>
                    <div style="color:var(--electric-blue); font-size:1.5rem; margin-bottom:15px;">${p.price} EGP</div>
                    <p>${p.desc}</p>
                    <button class="confirm-btn" onclick="addToCart(${p.id}); closeOverlay();">أضف للسلة 🔥</button>
                </div>
            `;
            document.getElementById('productOverlay').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeOverlay() { document.getElementById('productOverlay').style.display = 'none'; document.body.style.overflow = 'auto'; }

        function addToCart(id) {
            const p = products.find(prod => prod.id === id);
            cart.push(p);
            updateCart();
            alert("تمت الإضافة! ✅");
        }

        function updateCart() {
            document.getElementById('cartBadge').innerText = cart.length;
            let total = 0;
            let sum = "";
            cart.forEach(item => { total += item.price; sum += item.name + ", "; });
            document.getElementById('totalPrice').innerText = "الإجمالي: " + total + " EGP";
            document.getElementById('orderData').value = sum + " Total: " + total;
        }

        function setPayment(method) {
            document.getElementById('methodData').value = method;
            document.getElementById('btnCash').classList.toggle('active', method === 'Cash');
            document.getElementById('btnVoda').classList.toggle('active', method === 'Vodafone');
            document.getElementById('vodaDetails').style.display = (method === 'Vodafone') ? 'block' : 'none';
        }

        function openCart() { if(cart.length == 0) return alert("السلة فاضية!"); document.getElementById('cartPage').style.display = 'flex'; }
        function closeCart() { document.getElementById('cartPage').style.display = 'none'; }

        renderProducts();
    </script>
</body>
</html>
