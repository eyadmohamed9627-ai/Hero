    <div class="cart-page" id="cartPage">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="color:var(--electric-blue)">تأكيد الطلب ⚡</h2>
            <i class="fas fa-times" onclick="closeCart()" style="font-size:1.8rem; cursor:pointer"></i>
        </div>
        
        <div id="cartList" style="flex:0.5; overflow-y:auto; margin-bottom:15px; border-bottom:1px solid #222;"></div>
        
        <div id="totalPrice" style="text-align:center; padding:10px; font-size:1.3rem; color:var(--electric-blue); font-weight:bold;">الإجمالي: 0 EGP</div>
        
        <form action="https://formspree.io/f/xjgjkvqv" method="POST" enctype="multipart/form-data" id="orderForm">
            <input type="hidden" name="Order_Details" id="orderData">
            
            <input type="text" name="Name" placeholder="الاسم الكامل" required>
            <input type="tel" name="Phone" placeholder="رقم الموبايل" required>
            <input type="text" name="Address" placeholder="العنوان بالتفصيل" required>

            <div style="margin: 15px 0; background: #111; padding: 15px; border-radius: 10px; border: 1px solid #333;">
                <p style="margin-bottom: 10px; color: var(--electric-blue); font-weight: bold;">اختر طريقة الدفع:</p>
                
                <label style="display: block; margin-bottom: 10px; cursor: pointer;">
                    <input type="radio" name="Payment_Method" value="Cash" checked onclick="toggleVodafone(false)" style="width: auto; margin-left: 10px;"> 
                    الدفع عند الاستلام 🤝
                </label>

                <label style="display: block; cursor: pointer;">
                    <input type="radio" name="Payment_Method" value="Vodafone Cash" onclick="toggleVodafone(true)" style="width: auto; margin-left: 10px;"> 
                    فودافون كاش ⚡
                </label>
            </div>

            <div id="vodafoneDetails" style="display: none; background: #0a0a0a; padding: 15px; border: 1px dashed var(--electric-blue); border-radius: 10px; margin-bottom: 15px;">
                <p style="font-size: 0.9rem; margin-bottom: 10px; color: #fff;">
                    حول المبلغ لحسابنا: <br>
                    <strong style="font-size: 1.2rem; color: var(--electric-blue);">01018758798</strong>
                </p>
                <label style="font-size: 0.8rem; color: #aaa;">ارفق صورة التحويل (سكرين شوت):</label>
                <input type="file" name="Transfer_Screenshot" accept="image/*" id="fileInput" style="padding: 10px; font-size: 0.8rem; border: none; background: transparent;">
            </div>

            <button type="submit" class="add-btn">إرسال الطلب الآن 🚀</button>
        </form>
    </div>

    <script>
        // دالة لإظهار وإخفاء خيارات فودافون كاش
        function toggleVodafone(show) {
            const details = document.getElementById('vodafoneDetails');
            const fileInput = document.getElementById('fileInput');
            if (show) {
                details.style.display = 'block';
                fileInput.setAttribute('required', 'required');
            } else {
                details.style.display = 'none';
                fileInput.removeAttribute('required');
            }
        }

        // نفس الدوال السابقة مع تعديل بسيط في التحديث
        const products = [
            { id: 1, name: "سترينجر هيرو - برو", price: 450, img: "https://i.ibb.co/xKpLR6Rd/EFECD71-E-C885-4-E55-8-DC8-2-E2-A4-A0-DB76-C.jpg", desc: "خامة قطنية ليكرا ممتازة." },
            { id: 2, name: "تيشيرت الأداء العالي", price: 550, img: "https://i.ibb.co/xKpLR6Rd/EFECD71-E-C885-4-E55-8-DC8-2-E2-A4-A0-DB76-C.jpg", desc: "تقنية طاردة للعرق." },
            { id: 3, name: "بنطلون جوجر تيك", price: 750, img: "https://i.ibb.co/xKpLR6Rd/EFECD71-E-C885-4-E55-8-DC8-2-E2-A4-A0-DB76-C.jpg", desc: "تصميم عصري وجيوب جانبية." },
            { id: 4, name: "هودي هيرو شتوي", price: 950, img: "https://i.ibb.co/xKpLR6Rd/EFECD71-E-C885-4-E55-8-DC8-2-E2-A4-A0-DB76-C.jpg", desc: "ثقيل ومبطن من الداخل." }
        ];

        let cart = [];

        function renderProducts() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = products.map(p => `
                <div class="card" onclick="viewProduct(${p.id})">
                    <div class="img-box"><img src="${p.img}"></div>
                    <div class="info-box">
                        <h3>${p.name}</h3>
                        <div class="price">${p.price} EGP</div>
                        <div style="font-size:0.7rem; color:var(--electric-blue); margin-top:8px;">التفاصيل ⚡</div>
                    </div>
                </div>
            `).join('');
        }

        function viewProduct(id) {
            const p = products.find(prod => prod.id === id);
            const body = document.getElementById('overlayBody');
            body.innerHTML = `
                <img src="${p.img}" class="overlay-img">
                <div class="overlay-info">
                    <h1 style="font-family:'Oswald'; font-size:2rem; margin-bottom:10px;">${p.name}</h1>
                    <div class="price" style="font-size:1.8rem; margin-bottom:15px;">${p.price} EGP</div>
                    <p style="color:#ccc; line-height:1.7; margin-bottom:25px;">${p.desc}</p>
                    <button class="add-btn" onclick="addToCart(${p.id}); closeOverlay();">إضافة إلى السلة 🔥</button>
                </div>
            `;
            document.getElementById('productOverlay').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeOverlay() {
            document.getElementById('productOverlay').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            cart.push({ ...product, cartId: Date.now() });
            updateCart();
        }

        function removeFromCart(cartId) {
            cart = cart.filter(item => item.cartId !== cartId);
            updateCart();
        }

        function updateCart() {
            document.getElementById('cartBadge').innerText = cart.length;
            let total = 0;
            let summary = "";
            const list = document.getElementById('cartList');
            
            list.innerHTML = cart.map(item => {
                total += item.price;
                summary += `${item.name} (${item.price} EGP) | `;
                return `<div style="display:flex; justify-content:space-between; padding:10px; background:#111; margin-bottom:5px; border-radius:5px; font-size:0.9rem;">
                    <span>${item.name}</span>
                    <i class="fas fa-trash" style="color:#ff4444;" onclick="removeFromCart(${item.cartId})"></i>
                </div>`;
            }).join('');
            
            document.getElementById('totalPrice').innerText = "الإجمالي: " + total + " EGP";
            document.getElementById('orderData').value = summary + " المجموع الكلي: " + total + " EGP";
        }

        function openCart() { 
            if(cart.length == 0) return alert("السلة فاضية يا بطل!");
            document.getElementById('cartPage').style.display = 'flex'; 
        }
        function closeCart() { document.getElementById('cartPage').style.display = 'none'; }

        renderProducts();
    </script>
