<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HERO STORE ⚡ | تفاصيل الوحوش</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --electric-blue: #00f5ff;
            --thunder-purple: #9d00ff;
            --dark-void: #050505;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--dark-void); color: #fff; overflow-x: hidden; }

        /* الخلفية التفاعلية */
        .live-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: #000; }
        .live-bg-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.15; filter: saturate(1.8) contrast(1.3) hue-rotate(200deg); animation: thunderFlicker 5s infinite; }

        /* Navbar */
        .navbar { padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid var(--electric-blue); }
        .logo { font-family: 'Oswald', sans-serif; font-size: 2.2rem; font-weight: 900; color: #fff; text-shadow: 0 0 15px var(--electric-blue); cursor: pointer; }
        .cart-icon { position: relative; cursor: pointer; font-size: 1.6rem; color: var(--electric-blue); }
        .badge { position: absolute; top: -10px; right: -15px; background: var(--thunder-purple); color: white; font-size: 0.7rem; padding: 4px 8px; border-radius: 50%; }

        /* Grid */
        .container { padding: 40px 5%; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .card { background: var(--glass); backdrop-filter: blur(12px); border-radius: 25px; overflow: hidden; border: 1px solid rgba(0, 245, 255, 0.15); transition: 0.4s; cursor: pointer; }
        .card:hover { transform: translateY(-10px); border-color: var(--electric-blue); }
        .img-container { height: 350px; overflow: hidden; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .card:hover img { transform: scale(1.1); }
        .card-info { padding: 20px; text-align: center; }

        /* صفحة تفاصيل المنتج (Overlay) */
        .product-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 3000; display: none; overflow-y: auto; padding-bottom: 50px; }
        .close-overlay { position: absolute; top: 20px; right: 20px; font-size: 2rem; color: var(--electric-blue); cursor: pointer; z-index: 3001; }
        .overlay-content { display: flex; flex-direction: column; align-items: center; width: 100%; }
        .overlay-img { width: 100%; max-height: 60vh; object-fit: cover; border-bottom: 3px solid var(--electric-blue); }
        .details-body { padding: 30px 10%; text-align: right; width: 100%; }
        .details-title { font-size: 2.5rem; font-family: 'Oswald'; color: #fff; margin-bottom: 10px; }
        .details-price { font-size: 2rem; color: var(--electric-blue); font-weight: 900; margin-bottom: 20px; }
        .description-box { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border-right: 5px solid var(--electric-blue); margin-bottom: 30px; }
        
        /* أزرار الشراء */
        .buy-now-btn { width: 100%; padding: 20px; background: var(--electric-blue); color: #000; border: none; border-radius: 15px; font-weight: 900; font-size: 1.2rem; cursor: pointer; transition: 0.3s; }
        .buy-now-btn:hover { box-shadow: 0 0 30px var(--electric-blue); transform: scale(1.02); }

        /* سلة المشتريات */
        .cart-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 4000; display: none; flex-direction: column; padding: 25px; }

        @keyframes thunderFlicker { 0%, 93%, 100% { opacity: 0.15; } 95% { opacity: 0.4; } }
    </style>
</head>
<body>

    <div class="live-bg">
        <img src="https://i.ibb.co/cX8hJNDx/IMG-1910.jpg" class="live-bg-img">
    </div>

    <nav class="navbar">
        <div class="logo" onclick="window.location.reload()">HERO</div>
        <div class="cart-icon" onclick="openCart()">
            <i class="fas fa-bolt"></i>
            <span class="badge" id="cartBadge">0</span>
        </div>
    </nav>

    <div class="container" id="productGrid"></div>

    <div class="product-overlay" id="productOverlay">
        <span class="close-overlay" onclick="closeProduct()"><i class="fas fa-times"></i></span>
        <div class="overlay-content" id="overlayContent">
            </div>
    </div>

    <div class="cart-page" id="cartPage">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="color:var(--electric-blue)">سلة الوحوش 🛒</h2>
            <i class="fas fa-arrow-left" onclick="closeCart()" style="cursor:pointer; font-size:1.5rem"></i>
        </div>
        <div id="cartList" style="flex:1; overflow-y:auto; margin-top:20px;"></div>
        <div id="totalPrice" style="font-size:1.8rem; color:var(--electric-blue); text-align:center; padding:20px;">الإجمالي: 0 EGP</div>
        
        <form action="https://formspree.io/f/xjgjkvqv" method="POST" style="background:#111; padding:20px; border-radius:15px;">
            <input type="hidden" name="Order_Details" id="hiddenData">
            <input type="text" name="Name" class="buy-now-btn" style="background:none; border:1px solid #333; color:#fff; margin-bottom:10px; text-align:right;" placeholder="الاسم" required>
            <input type="tel" name="Phone" class="buy-now-btn" style="background:none; border:1px solid #333; color:#fff; margin-bottom:10px; text-align:right;" placeholder="رقم الموبايل" required>
            <button type="submit" class="buy-now-btn">تأكيد الطلب 🚀</button>
        </form>
    </div>

    <script>
        const products = [
            { 
                id: 1, 
                name: "سترينجر هيرو الأصلي", 
                price: 350, 
                img: "https://images.unsplash.com/photo-1583454110551-21f2fa20019b?w=800",
                desc: "مصمم للتمارين الشاقة، خامة قطنية ليكرا تسمح بمرور الهواء وتبريد الجسم أثناء الرفع الثقيل. قصة تبرز عضلات الصدر والظهر."
            },
            { 
                id: 2, 
                name: "تيشيرت الدرع الأسود", 
                price: 450, 
                img: "https://images.unsplash.com/photo-1521572267360-ee0c2909d518?w=800",
                desc: "تيشيرت ضاغط (Compression) يساعد على تدفق الدم للعضلات، مثالي لأيام الكارديو والجري."
            },
            { 
                id: 3, 
                name: "بنطلون تايتان برو", 
                price: 600, 
                img: "https://images.unsplash.com/photo-1506629082955-511b1aa562c8?w=800",
                desc: "مرونة فائقة 360 درجة، جيوب جانبية مخفية للموبايل، حزام خصر مدعم لا ينزلق أثناء السكوات."
            }
        ];

        let cart = [];

        function renderProducts() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = products.map(p => `
                <div class="card" onclick="viewProduct(${p.id})">
                    <div class="img-container"><img src="${p.img}"></div>
                    <div class="card-info">
                        <h3>${p.name}</h3>
                        <div style="color:var(--electric-blue); font-weight:900;">${p.price} EGP</div>
                        <p style="font-size:0.8rem; color:#aaa; margin-top:5px;">اضغط للتفاصيل ⚡</p>
                    </div>
                </div>
            `).join('');
        }

        function viewProduct(id) {
            const p = products.find(prod => prod.id === id);
            const overlay = document.getElementById('productOverlay');
            const content = document.getElementById('overlayContent');

            content.innerHTML = `
                <img src="${p.img}" class="overlay-img">
                <div class="details-body">
                    <h1 class="details-title">${p.name}</h1>
                    <div class="details-price">${p.price} EGP</div>
                    <div class="description-box">
                        <h3 style="margin-bottom:10px;">عن المنتج:</h3>
                        <p style="color:#ccc;">${p.desc}</p>
                    </div>
                    <button class="buy-now-btn" onclick="addToCart(${p.id}); closeProduct();">أضف للقوة 🔥</button>
                </div>
            `;
            overlay.style.display = 'block';
            document.body.style.overflow = 'hidden'; // منع السكرول في الخلفية
        }

        function closeProduct() {
            document.getElementById('productOverlay').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            cart.push(product);
            updateCartUI();
            alert("تمت إضافة المنتج لمعداتك! ⚡");
        }

        function updateCartUI() {
            const badge = document.getElementById('cartBadge');
            const list = document.getElementById('cartList');
            const totalBox = document.getElementById('totalPrice');
            const hiddenData = document.getElementById('hiddenData');

            badge.innerText = cart.length;
            let total = 0;
            let summary = "";

            list.innerHTML = cart.map((item, index) => {
                total += item.price;
                summary += `- ${item.name} (${item.price} EGP)\n`;
                return `
                    <div style="display:flex; justify-content:space-between; background:#111; padding:15px; border-radius:10px; margin-bottom:10px;">
                        <span>${item.name}</span>
                        <span style="color:var(--electric-blue)">${item.price} EGP</span>
                    </div>
                `;
            }).join('');

            totalBox.innerText = `الإجمالي: ${total} EGP`;
            hiddenData.value = summary + "الإجمالي: " + total;
        }

        function openCart() { document.getElementById('cartPage').style.display = 'flex'; }
        function closeCart() { document.getElementById('cartPage').style.display = 'none'; }

        renderProducts();
    </script>
</body>
</html>
